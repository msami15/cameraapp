name: Build Android APK

# Builds a debug APK automatically on every push, and can also be triggered
# manually from the Actions tab ("Run workflow"). No local Android Studio,
# SDK, or terminal needed — GitHub's runners already have everything
# required preinstalled.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BarqCam-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
